    return genreOk&&searchOk;
  });
  document.getElementById("count-label").textContent=filtered.length+"개 게임";
  tbody.innerHTML=filtered.map(g=>`<tr>
    <td class="rank">${g.r}</td>
    <td class="name">${g.n}</td>
    <td class="genre-badge"><span class="badge ${badgeClass[g.g]}">${genreLabel[g.g]}</span></td>
    <td class="desc">${g.d}</td>
  </tr>`).join("");
}

document.getElementById("filters").addEventListener("click",e=>{
  const btn=e.target.closest(".filter-btn");
  if(!btn)return;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  activeGenre=btn.dataset.genre;
  render();
});

document.getElementById("search").addEventListener("input",e=>{
  searchTerm=e.target.value.toLowerCase();
  render();
});

render();
</script>
